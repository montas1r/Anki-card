<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anki Flashcards - Ultra-Slim Core</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="slim-navbar">
    <div class="nav-brand" style="cursor:pointer;" onclick="AppEngine.switchView('decks')">
      <span>🧠 Anki Flashcards</span>
    </div>

    <div class="search-anchor-wrapper">
      <button class="icon-btn search-trigger-target" id="search-nav-btn" title="Search Workspaces" onclick="AppEngine.toggleSearchPanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      
      <div id="search-utility-rack" class="utility-drawer hidden">
        <svg class="search-inside-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="navbar-search-input" placeholder="Search repositories or card content..." oninput="AppEngine.executeWorkspaceSearch()" />
        <button class="search-close-x" onclick="AppEngine.toggleSearchPanel()">✕</button>
      </div>
    </div>

    <div class="nav-actions">
      <button class="icon-btn" title="Decks View" onclick="AppEngine.switchView('decks')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19h16v2H4zm0-4h16v2H4zm0-4h16v2H4zm0-4h16v2H4z"/></svg>
      </button>
    </div>
  </nav>

  <main class="workspace-wrapper">
    
    <section id="view-decks" class="view-panel">
      <div class="view-header">
        <div style="display:flex; flex-direction:column; gap:6px;">
          <h2>My Repositories</h2>
          <div class="view-mode-selector">
            <button class="mode-tab active" onclick="AppEngine.changeLayoutMode('blocks', this)">Blocks</button>
            <button class="mode-tab" onclick="AppEngine.changeLayoutMode('tiles', this)">Tiles</button>
            <button class="mode-tab" onclick="AppEngine.changeLayoutMode('list', this)">List</button>
            <button class="mode-tab" onclick="AppEngine.changeLayoutMode('small', this)">Small</button>
            <button class="mode-tab" onclick="AppEngine.changeLayoutMode('big', this)">Big</button>
          </div>
        </div>
        <button class="btn dynamic-btn primary" onclick="document.getElementById('deck-modal').classList.remove('hidden')">+ New Deck</button>
      </div>
      <div id="decks-grid" class="flat-grid dynamic-layout-blocks"></div>
    </section>

    <section id="view-cards" class="view-panel hidden">
      <div class="view-header" style="flex-direction:column; align-items:stretch; gap:12px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <button class="btn flat-action" onclick="AppEngine.switchView('decks')">← Repositories</button>
          <h2 id="active-deck-title">Deck Workspace</h2>
          <div class="action-cluster">
            <button class="btn dynamic-btn success" onclick="AppEngine.startStudySession()">▶ Study Due</button>
            <button class="btn dynamic-btn primary" onclick="document.getElementById('card-modal').classList.remove('hidden')">+ Add Card</button>
          </div>
        </div>
      </div>
      <div id="cards-list-workspace" class="list-stack"></div>
    </section>

    <section id="view-study" class="view-panel hidden">
      <div class="view-header">
        <button class="btn flat-action" onclick="AppEngine.switchView('cards')">← Cancel Session</button>
        <div id="study-progress-indicator" class="meta-label">Remaining: 0</div>
      </div>

      <div class="card-workspace-container">
        <div class="flat-card-viewport" id="card-viewport" onclick="AppEngine.flipCard()">
          <div class="card-side front-side" id="card-display-front"></div>
          <div class="card-side back-side hidden-opacity" id="card-display-back"></div>
        </div>

        <footer class="metadata-footer">
          <div class="meta-block"><span>Created:</span> <span id="meta-created">-</span></div>
          <div class="meta-block"><span>Reviewed:</span> <span id="meta-reviewed">-</span></div>
          <div class="meta-block"><span>Next Schedule:</span> <span id="meta-due">-</span></div>
        </footer>
      </div>

      <div id="study-rating-controls" class="rating-hub hidden">
        <button class="btn dynamic-btn danger" onclick="AppEngine.submitReview(0)">Again <kbd>1</kbd></button>
        <button class="btn dynamic-btn ghost" onclick="AppEngine.submitReview(3)">Hard <kbd>2</kbd></button>
        <button class="btn dynamic-btn primary" onclick="AppEngine.submitReview(4)">Good <kbd>3</kbd></button>
        <button class="btn dynamic-btn success" onclick="AppEngine.submitReview(5)">Easy <kbd>4</kbd></button>
      </div>
    </section>
  </main>

  <div id="deck-modal" class="flat-modal hidden">
    <div class="modal-box">
      <h3>Initialize Deck</h3>
      <input type="text" id="input-deck-name" placeholder="Deck Identifier" />
      <textarea id="input-deck-desc" placeholder="Operational Directives / Description"></textarea>
      <div class="modal-foot">
        <button class="btn flat-action" onclick="AppEngine.closeDeckModal()">Cancel</button>
        <button class="btn dynamic-btn primary" onclick="AppEngine.commitDeck()">Create</button>
      </div>
    </div>
  </div>

  <div id="card-modal" class="flat-modal hidden">
    <div class="modal-box" style="max-width: 500px; width: 90%;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: var(--flat-border); padding-bottom: 8px;">
        <h3 id="modal-card-headline" style="margin: 0;">Append Flashcard</h3>
        <div class="modal-mode-toggle" id="modal-mode-tabs">
          <button class="mode-tab active" id="tab-mode-single" onclick="AppEngine.setCardModalMode('single')">Single</button>
          <button class="mode-tab" id="tab-mode-bulk" onclick="AppEngine.setCardModalMode('bulk')">Bulk Fast-Load</button>
        </div>
      </div>

      <div id="modal-form-single">
        <textarea id="input-card-front" placeholder="Front Face Text (Prompt/Question)"></textarea>
        <textarea id="input-card-back" placeholder="Back Face Text (Core Target Answer)"></textarea>
      </div>

      <div id="modal-form-bulk" class="hidden">
        <div class="bulk-ingest-header" style="margin-bottom: 8px;">
          <span style="font-size: 11px; color: var(--primary-teal); font-weight: 600;">Format: Front,Back (Separate cards with Enter/Newline)</span>
          <span id="bulk-counter-badge" class="bulk-counter">0 cards detected</span>
        </div>
        <textarea id="bulk-paste-area" style="height: 140px;" placeholder="Example:&#10;Front Side Text,Back Side Text&#10;Another Prompt,Another Answer" oninput="AppEngine.calculateBulkCards()"></textarea>
      </div>

      <div class="modal-foot" style="margin-top: 16px;">
        <button class="btn flat-action" onclick="AppEngine.closeCardModal()">Cancel</button>
        <button class="btn dynamic-btn primary" id="modal-card-submit-btn" onclick="AppEngine.commitCardWindowData()">Save Card</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/viewModes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
